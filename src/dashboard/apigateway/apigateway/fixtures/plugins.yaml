                        }
                      }
                    },
                    "remove": {
                        "type": "array",
                        "items": {
                          "type": "string",
                          "pattern": "^[^:]+$"
                        }
                    }
                }
            },
            "vars": {
                "type": "array",
                "maxItems": 20,
                "items": {
                    "type": "array"
                }
            }
        }
      }
    description: '-'
    example: '-'
