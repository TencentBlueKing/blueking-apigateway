- model: schema.schema
  fields:
    created_time: 2026-07-01 00:00:00.000000+00:00
    updated_time: 2026-07-01 00:00:00.000000+00:00
    name: bk-query-string-rewrite
    type: plugin
    version: '0'
    _schema: |-
      {
        "$comment": "this is a mark for our injected plugin schema",
        "type": "object",
        "minProperties": 1,
        "additionalProperties": false,
        "properties": {
          "add": {
            "type": "object",
            "additionalProperties": false,
            "patternProperties": {
              "^[^=&#?]+$": {
                "oneOf": [
                  {
                    "type": "string"
                  },
                  {
                    "type": "number"
                  }
                ]
              }
            }
          },
          "set": {
            "type": "object",
            "additionalProperties": false,
            "patternProperties": {
              "^[^=&#?]+$": {
                "oneOf": [
                  {
                    "type": "string"
                  },
                  {
                    "type": "number"
                  }
                ]
              }
            }
          },
          "remove": {
            "type": "array",
            "items": {
              "type": "string",
              "pattern": "^[^=&#?]+$"
            }
          }
        }
      }
    description: Rewrite request query string parameters by add/set/remove operations.
    example: |-
      add:
        version: v2
      set:
        source: gateway
      remove:
      - debug
