        "type": "object",
        "description": "new headers for request",
        "minProperties": 1,
        "additionalProperties": false,
        "properties": {
          "set": {
            "type": "object",
            "patternProperties": {
              "^[^:]+$": {
                "oneOf": [
                  {
                    "type": "string"
                  },
                  {
                    "type": "number"
                  }
                ]
              }
            }
          },
          "remove": {
            "type": "array",
            "items": {
              "type": "string",
              "pattern": "^[^:]+$"
            }
          }
        }
      }
    description: '-'
    example: '-'
- model: plugin.plugintype
  fields:
    code: bk-header-rewrite
    name: Header 转换
    name_en: Header transformation
    description: "对请求添加或删除请求头。\n注意设置的值中支持`$`符号，（变量，不存在则为空）; `$arg_foo`获取 query string 中`foo`的值，`$http_bar`可以获取 header 中 `bar`的值。"
    description_en: Allow you to easily add or remove request headers. If a value for a setting contains the $ symbol, it will be treated as a variable and its value will be replaced (with the variable's value or empty if the variable does not exist). `$arg_foo` can fetch the value of `foo` from the query string, and `$http_bar` can fetch the value of `bar` from the header.
    is_public: true
    scope: stage_and_resource
    priority: 17421
    _tags: "转换,Transformation"
    schema:
    - bk-header-rewrite
    - plugin
    - '0'
- model: schema.schema
  fields:
    created_time: 2022-11-24 11:59:49.409202+00:00
    updated_time: 2023-02-01 08:08:33.453910+00:00
    name: bk-ip-restriction
    type: plugin
    version: '0'
    _schema: |-
      {
        "$comment": "this is a mark for our injected plugin schema",
        "properties": {
          "whitelist": {
            "items": {
              "anyOf": [
                {
                  "format": "ipv4",
                  "type": "string",
                  "title": "IPv4"
                },
                {
                  "pattern": "^([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])/([12]?[0-9]|3[0-2])$",
                  "type": "string",
                  "title": "IPv4/CIDR"
                },
                {
                  "format": "ipv6",
                  "type": "string",
                  "title": "IPv6"
                },
                {
                  "pattern": "^([a-fA-F0-9]{0,4}:){1,8}(:[a-fA-F0-9]{0,4}){0,8}([a-fA-F0-9]{0,4})?/[0-9]{1,3}$",
                  "type": "string",
                  "title": "IPv6/CIDR"
                }
              ]
            },
            "type": "array",
            "minItems": 1
          },
          "message": {
            "default": "Your IP address is not allowed",
            "minLength": 1,
            "type": "string",
            "maxLength": 1024
          },
          "blacklist": {
            "items": {
              "anyOf": [
                {
                  "format": "ipv4",
                  "type": "string",
                  "title": "IPv4"
                },
                {
                  "pattern": "^([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])/([12]?[0-9]|3[0-2])$",
                  "type": "string",
                  "title": "IPv4/CIDR"
                },
                {
                  "format": "ipv6",
                  "type": "string",
                  "title": "IPv6"
                },
                {
                  "pattern": "^([a-fA-F0-9]{0,4}:){1,8}(:[a-fA-F0-9]{0,4}){0,8}([a-fA-F0-9]{0,4})?/[0-9]{1,3}$",
                  "type": "string",
                  "title": "IPv6/CIDR"
                }
              ]
            },
            "type": "array",
            "minItems": 1
          },
          "_meta": {
            "type": "object",
            "properties": {
              "error_response": {
                "oneOf": [
                  {
                    "type": "string"
                  },
                  {
                    "type": "object"
                  }
                ]
              },
              "disable": {
                "type": "boolean"
              },
              "priority": {
                "description": "priority of plugins by customized order",
                "type": "integer"
              },
              "filter": {
                "description": "filter determines whether the plugin needs to be executed at runtime",
                "type": "array"
              }
            }
          }
        },
        "type": "object",
        "oneOf": [
          {
            "required": [
              "whitelist"
            ]
          },
          {
            "required": [
              "blacklist"
            ]
          }
        ]
      }
    description: '-'
    example: '-'
