    "django-prometheus==2.5.0",
    "bkapi-client-core==1.2.0",
    "python-redis-lock==4.0.1",
    "etcd3==0.12.0",
    "grpcio==1.81.1",
    "protobuf==7.35.1",
    "bkapi-bk-apigateway>=1.0.12,<2",
    "docutils>=0.20.1",
    "Pygments==2.20.0",
